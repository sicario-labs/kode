name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            go build -o kode.exe ./cmd/kode
          else
            go build -o kode ./cmd/kode
          fi
        shell: bash
        env:
          CGO_ENABLED: "0"

      - name: Vet
        run: go vet ./...
        env:
          CGO_ENABLED: "0"

      - name: Test
        run: go test ./...
        env:
          CGO_ENABLED: "0"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Typecheck
        run: bunx turbo typecheck

  build-tui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Build TUI (smoke test)
        working-directory: packages/kode
        run: bun run build --single --skip-embed-web-ui --skip-install

 