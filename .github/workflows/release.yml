name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-X main.version=${GITHUB_REF_NAME#v} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%d)" -o dist/kode-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/kode
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kode-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/kode-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  compile-tui:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            tui_os: linux
            tui_arch: x64
            ext: ""
          - os: ubuntu-latest
            tui_os: linux
            tui_arch: arm64
            ext: ""
          - os: windows-latest
            tui_os: windows
            tui_arch: x64
            ext: ".exe"
          - os: macos-latest
            tui_os: darwin
            tui_arch: arm64
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install TUI dependencies
        working-directory: .
        run: bun install --frozen-lockfile
        shell: bash

      - name: Compile TUI binary (native)
        if: matrix.tui_os != 'linux' || matrix.tui_arch != 'arm64'
        env:
          KODE_CHANNEL: latest
          KODE_VERSION: ${{ github.ref_name }}
        working-directory: packages/kode
        run: |
          V="${KODE_VERSION#v}" && KODE_VERSION="$V" bun run script/build.ts --single --skip-embed-web-ui --skip-install 2>&1
          mkdir -p ../../dist
          cp dist/*/*/bin/kode${{ matrix.ext }} ../../dist/kode-tui-${{ matrix.tui_os }}-${{ matrix.tui_arch }}${{ matrix.ext }}
        shell: bash

      - name: Setup QEMU for arm64
        if: matrix.tui_os == 'linux' && matrix.tui_arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Compile TUI binary (arm64 via QEMU)
        if: matrix.tui_os == 'linux' && matrix.tui_arch == 'arm64'
        env:
          KODE_CHANNEL: latest
          KODE_VERSION: ${{ github.ref_name }}
        run: |
          V="${KODE_VERSION#v}"
          mkdir -p dist
          docker run --rm --platform linux/arm64 \
            -e KODE_CHANNEL -e KODE_VERSION="$V" \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/packages/kode \
            oven/bun:latest \
            sh -c "bun install --frozen-lockfile && bun run script/build.ts --single --skip-embed-web-ui --skip-install && cp dist/*/*/bin/kode /workspace/dist/kode-tui-linux-arm64"
        shell: bash

      - name: Upload TUI binary
        uses: actions/upload-artifact@v4
        with:
          name: kode-tui-${{ matrix.tui_os }}-${{ matrix.tui_arch }}
          path: dist/kode-tui-${{ matrix.tui_os }}-${{ matrix.tui_arch }}${{ matrix.ext }}

  release:
    needs: [build, compile-tui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Organize release assets
        run: |
          mkdir -p release-assets
          # Flatten Go binary artifacts
          for dir in dist/kode-*/; do
            [ -d "$dir" ] && cp "$dir"/* release-assets/ 2>/dev/null || true
          done
          # Flatten TUI binary artifacts
          for dir in dist/kode-tui-*/; do
            [ -d "$dir" ] && cp "$dir"/* release-assets/ 2>/dev/null || true
          done
          # Copy install scripts
          cp script/install.sh release-assets/ 2>/dev/null || true
          cp script/install.ps1 release-assets/ 2>/dev/null || true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-npm:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Upgrade npm to v11 for OIDC support
        run: npm install -g npm@11

      - name: Update version in npm package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: packages/kode

      - name: Verify npm version with provenance support
        run: npm --version

      - name: Publish to npm
        run: |
          TAG="latest"
          case "${GITHUB_REF_NAME#v}" in
            *-*) TAG="next" ;;
          esac
          npm publish --provenance --access public --tag "$TAG"
        working-directory: packages/kode
