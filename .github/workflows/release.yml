name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build Go binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-X main.version=${GITHUB_REF_NAME#v} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%d)" -o dist/kode-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/kode
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kode-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/kode-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  bundle-tui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install TUI dependencies
        working-directory: vendored/opencode
        run: bun install --frozen-lockfile

      - name: Bundle TUI assets
        run: |
          mkdir -p dist/tui
          cp -r vendored/opencode/packages dist/tui/packages
          cp vendored/opencode/package.json vendored/opencode/bun.lock dist/tui/
          cp vendored/opencode/tsconfig.json dist/tui/ 2>/dev/null || true

      - name: Compress TUI bundle
        run: |
          cd dist
          tar czf tui-bundle.tar.gz tui/
          sha256sum tui-bundle.tar.gz > tui-bundle.tar.gz.sha256

      - name: Upload TUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: tui-bundle
          path: dist/tui-bundle.tar.gz*

  release:
    needs: [build, bundle-tui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Organize release assets
        run: |
          mkdir -p release-assets
          # Flatten binary artifacts
          for dir in dist/kode-*/; do
            [ -d "$dir" ] && cp "$dir"/* release-assets/ 2>/dev/null || true
          done
          # Copy TUI bundle
          cp dist/tui-bundle/tui-bundle.tar.gz* release-assets/ 2>/dev/null || true
          # Copy install scripts
          cp script/install.sh release-assets/ 2>/dev/null || true
          cp script/install.ps1 release-assets/ 2>/dev/null || true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-npm:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Update version in npm package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: packages/npm

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
